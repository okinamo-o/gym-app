<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="60" fill="#09090b"/>
  
  <!-- Glow Effect -->
  <circle cx="128" cy="128" r="80" fill="#38bdf8" opacity="0.3" filter="blur(20px)"/>

  <!-- Bar -->
  <rect x="30" y="118" width="196" height="20" rx="4" fill="#ffffff"/>
  
  <!-- Left Inner Weights -->
  <rect x="60" y="70" width="18" height="116" rx="6" fill="#38bdf8"/>
  <rect x="60" y="70" width="9" height="116" rx="6" fill="#7dd3fc" opacity="0.6"/>
  
  <!-- Left Outer Weights -->
  <rect x="38" y="85" width="14" height="86" rx="4" fill="#818cf8"/>
  <rect x="38" y="85" width="7" height="86" rx="4" fill="#a5b4fc" opacity="0.6"/>

  <!-- Right Inner Weights -->
  <rect x="178" y="70" width="18" height="116" rx="6" fill="#38bdf8"/>
  <rect x="178" y="70" width="9" height="116" rx="6" fill="#7dd3fc" opacity="0.6"/>

  <!-- Right Outer Weights -->
  <rect x="204" y="85" width="14" height="86" rx="4" fill="#818cf8"/>
  <rect x="204" y="85" width="7" height="86" rx="4" fill="#a5b4fc" opacity="0.6"/>
</svg>
